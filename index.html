<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Агрегатор Pro</title>
    <style>
        /* БАЗОВЫЕ СТИЛИ */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { display: flex; height: 100vh; overflow: hidden; background-color: #f0f2f5; color: #333; }
        button { cursor: pointer; border: none; outline: none; transition: 0.2s; }

        /* ЛЕВАЯ ПАНЕЛЬ */
        .sidebar { width: 260px; background-color: #ffffff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; z-index: 10; }

        .user-profile { padding: 20px 15px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; background: #f9f9f9; cursor: pointer; }
        .user-profile:hover { background: #f1f1f1; }
        .user-avatar { width: 35px; height: 35px; background: #888; border-radius: 50%; }

        .menu-item { padding: 15px 20px; border-bottom: 1px solid #eee; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { background: #f5f5f5; }

        /* ОСНОВНАЯ ЧАСТЬ */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }

        /* КОНТЕЙНЕР ДЛЯ ОКОН */
        .windows-container { flex: 1; display: flex; overflow-x: auto; padding: 20px; gap: 20px; background: #eaeff2; }
        
        /* ОКНА ЧАТА */
        .ai-window { flex: 1; min-width: 300px; max-width: 500px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #e5e5e5; }
        .ai-header { padding: 15px; border-bottom: 1px solid #eee; background: #fafafa; display: flex; justify-content: space-between; align-items: center; }
        .ai-select { padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-weight: 600; outline: none; width: 100%; }
        .ai-chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        
        /* СООБЩЕНИЯ */
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 10px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .msg-user { align-self: flex-end; background: #0078ff; color: #fff; border-bottom-right-radius: 2px; }
        .msg-ai { align-self: flex-start; background: #f1f3f4; color: #333; border-bottom-left-radius: 2px; }

        /* ПОЛЕ ВВОДА (ВНИЗУ) */
        .input-zone { padding: 20px; background: #fff; border-top: 1px solid #e0e0e0; display: flex; gap: 15px; align-items: center; }
        .main-input { flex: 1; padding: 15px; border: 1px solid #ccc; border-radius: 25px; font-size: 15px; outline: none; transition: border 0.3s; }
        .main-input:focus { border-color: #0078ff; }
        .send-btn { padding: 12px 25px; border-radius: 25px; background: #0078ff; color: #fff; font-weight: 600; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .send-btn:hover { background: #005bb5; }
        
        .summary-btn { padding: 12px 20px; border-radius: 25px; background: linear-gradient(90deg, #ff8a00, #e52e71); color: #fff; font-weight: 600; font-size: 15px; border: none; cursor: pointer; transition: 0.3s; box-shadow: 0 2px 10px rgba(229, 46, 113, 0.3); }
        .summary-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(229, 46, 113, 0.4); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-profile">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="user-avatar"></div>
                <strong>Мой Профиль</strong>
            </div>
            <div>⚙️</div>
        </div>
        <div class="menu-item" onclick="addWindow()">➕ Добавить окно</div>
        <div class="menu-item" style="margin-top: auto; color: red;">🚪 Выход</div>
    </div>

    <div class="main-content">
        <div class="windows-container" id="windowsContainer">
            </div>

        <div class="input-zone">
            <input type="text" class="main-input" id="mainInput" placeholder="Введите ваш вопрос для всех нейросетей..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">Отправить</button>
            <button class="summary-btn" onclick="summarizeAll()">✨ Общий ответ</button>
        </div>
    </div>

    <script>
        // Твоя ссылка на n8n
        const N8N_WEBHOOK_URL = 'https://tgdomen.ru/webhook/3bcfce39-4b24-4493-b3a7-cab0030e8a36';

        let lastAnswersByModel = {}; 

        // --- 1. СОЗДАНИЕ ОКНА ---
        function addWindow() {
            const container = document.getElementById('windowsContainer');
            const win = document.createElement('div');
            win.className = 'ai-window';
            
            // Здесь список моделей как было у тебя
            win.innerHTML = `
                <div class="ai-header">
                    <select class="ai-select">
                        <option value="gpt-4o">ChatGPT-4o</option>
                        <option value="gpt-4o-mini">ChatGPT-4o-mini</option>
                        <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
                        <option value="yandex-gpt">YandexGPT</option>
                    </select>
                </div>
                <div class="ai-chat-box"></div>
            `;
            container.appendChild(win);
        }

        // --- 2. ОТПРАВКА ВОПРОСА ---
        async function sendMessage() {
            const input = document.getElementById('mainInput');
            const text = input.value.trim();
            if (!text) return;

            const windows = document.querySelectorAll('.ai-window');
            if (windows.length === 0) return;

            // Очищаем хранилище перед новым запросом
            lastAnswersByModel = {};

            // Обрати внимание: мы используем index, чтобы ответы не перезаписывали друг друга
            windows.forEach(async (win, index) => {
                const chatBox = win.querySelector('.ai-chat-box');
                const select = win.querySelector('.ai-select');
                
                if (!select) return; // Пропускаем окно саммаризатора

                const model = select.value;

                // Сообщение юзера
                const msgUser = document.createElement('div');
                msgUser.className = 'msg msg-user';
                msgUser.innerText = text;
                chatBox.appendChild(msgUser);
                chatBox.scrollTop = chatBox.scrollHeight;

                // Плашка "Печатает..."
                const msgAi = document.createElement('div');
                msgAi.className = 'msg msg-ai';
                msgAi.innerText = 'Печатает...';
                chatBox.appendChild(msgAi);
                chatBox.scrollTop = chatBox.scrollHeight;

                try {
                    const response = await fetch(N8N_WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            prompt: text,
                            model: model
                        })
                    });

                    const data = await response.json();
                    const answerText = data.text || data.answer || 'Пустой ответ';
                    msgAi.innerText = answerText;

                    // Сохраняем ответ по ИНДЕКСУ окна
                    lastAnswersByModel[index] = {
                        provider: "API",
                        model: model,
                        text: answerText
                    };

                } catch (err) {
                    console.error('Ошибка в окне:', err);
                    msgAi.innerText = 'Ошибка соединения.';
                }
            });

            input.value = '';
        }

        // --- 3. САММАРИЗАТОР ---
        async function summarizeAll() {
            // Собираем сохраненные ответы
            const answersArray = Object.values(lastAnswersByModel);

            if (answersArray.length === 0) {
                alert("Сначала задайте вопрос нейросетям!");
                return;
            }

            // Ищем текст вопроса пользователя
            const firstWin = document.querySelector('.ai-window');
            const userMessages = firstWin.querySelectorAll('.msg-user');
            const userQuery = userMessages.length > 0 ? userMessages[userMessages.length - 1].innerText : "Вопрос не найден";

            // Собираем чистую посылку для n8n
            const payload = {
                mode: "summary",
                user_query: userQuery,
                answers: answersArray
            };

            try {
                // Отправляем в n8n
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload) 
                });

                const raw = await response.text();

                if (!response.ok) {
                    alert(`Саммаризатор: ошибка сервера (${response.status}). Смотри консоль.`);
                    console.error("Server error:", raw);
                    return;
                }

                let data;
                try {
                    data = JSON.parse(raw);
                } catch (e) {
                    alert("Саммаризатор: сервер вернул не JSON. Смотри консоль.");
                    console.error("Non-JSON response:", raw);
                    return;
                }

                const summaryText = data.text || data.answer || "Пустой ответ от сервера";

                // Создаем 4-е окно
                addWindow(); 
                const windows = document.querySelectorAll('.ai-window');
                const newWin = windows[windows.length - 1];

                // Оформляем заголовок
                const select = newWin.querySelector('.ai-select');
                if (select) {
                    select.outerHTML = '<div style="padding: 10px; font-weight: bold; background: linear-gradient(90deg, #ff8a00, #e52e71); -webkit-background-clip: text; color: transparent;">✨ ИИ-Саммаризатор</div>';
                }

                // Вставляем финальный текст
                const chatBox = newWin.querySelector('.ai-chat-box');
                const msgAi = document.createElement('div');
                msgAi.className = 'msg msg-ai';
                msgAi.innerText = summaryText;

                chatBox.appendChild(msgAi);
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (err) {
                console.error("Summary fetch failed:", err);
                alert("Саммаризатор: ошибка сети");
            }
        }

        // Старт: открываем 3 окна по умолчанию
        addWindow(); addWindow(); addWindow();
    </script>
</body>
</html>
